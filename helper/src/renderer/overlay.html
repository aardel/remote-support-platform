<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .bar {
      display: flex; align-items: center; gap: 10px;
      height: 44px; margin: 5px 8px; padding: 0 10px 0 14px;
      background: #111827; color: #fff;
      border: 1px solid #ef4444; border-radius: 22px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
      -webkit-app-region: drag;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444;
      box-shadow: 0 0 8px #ef4444; flex-shrink: 0; animation: pulse 1.3s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .txt { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .end { -webkit-app-region: no-drag; background: #ef4444; color: #fff; border: none;
      border-radius: 14px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .end:hover { background: #dc2626; }
  </style>
</head>
<body>
  <div class="bar">
    <span class="dot"></span>
    <span class="txt" id="txt">A technician is viewing your screen</span>
    <button class="end" id="end">End session</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('overlay:data', (_e, d) => {
      const t = d && d.technician;
      document.getElementById('txt').textContent =
        t ? (t + ' is viewing your screen') : 'A technician is viewing your screen';
    });
    document.getElementById('end').onclick = () => ipcRenderer.send('overlay-end');
  </script>
</body>
</html>
